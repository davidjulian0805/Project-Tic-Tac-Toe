<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="Page.css">
</head>
<body>
    <div id="label-div">
        <h2>Tic Tac Toe</h2>
        <label for="p1name">Player 1 - X</label>
        <input id="p1name" type="text" placeholder="Name Player 1">
        <label for="p2name">Player 2 - O</label>
        <input id="p2name" type="text" placeholder="Name player 2">
        <label id="result"></label>
        <button id="startbtn">Start Game</button>
        <button id="resetBtn">Reset</button>
        <p id="turn-indicator"></p> 
    </div>
    <div id="board">
        <div class="field"><button class="fieldBtn" data-index="0"></button></div>
        <div class="field"><button class="fieldBtn" data-index="1"></button></div>
        <div class="field"><button class="fieldBtn" data-index="2"></button></div>
        <div class="field"><button class="fieldBtn" data-index="3"></button></div>
        <div class="field"><button class="fieldBtn" data-index="4"></button></div>
        <div class="field"><button class="fieldBtn" data-index="5"></button></div>
        <div class="field"><button class="fieldBtn" data-index="6"></button></div>
        <div class="field"><button class="fieldBtn" data-index="7"></button></div>
        <div class="field"><button class="fieldBtn" data-index="8"></button></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
